name: Deploy Frontend to Vercel

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Link and deploy from root (monorepo)
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd=apps/frontend
          vercel build --prod --token="$VERCEL_TOKEN" --cwd=apps/frontend
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd=apps/frontend)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Deployment Summary
        run: echo "### ✅ Deployed to ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
